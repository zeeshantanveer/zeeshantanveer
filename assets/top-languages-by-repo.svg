<svg width="520" height="300" viewBox="0 0 520 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Top 5 Languages by Repository</title>
  <desc id="desc">Top repository languages for Zeeshan Tanveer on GitHub.</desc>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="520" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="360" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0088CC"/>
      <stop offset="1" stop-color="#00E5FF"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="520" height="300" rx="10" fill="url(#cardBg)"/>
  <rect x="1" y="1" width="518" height="298" rx="9" stroke="#0088CC" stroke-opacity="0.35" stroke-width="2"/>
  <text x="34" y="48" fill="#00E5FF" font-size="27" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Top 5 Languages by Repository</text>
  <text x="34" y="76" fill="#94A3B8" font-size="13" font-family="Segoe UI, Arial, sans-serif">Based on public repository language presence</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="600">
    <text x="34" y="116" fill="#E0E0FF">HTML</text>
    <rect x="150" y="101" width="300" height="16" rx="8" fill="#1F2937"/>
    <rect x="150" y="101" width="300" height="16" rx="8" fill="url(#barGrad)"/>
    <text x="465" y="116" fill="#E0E0FF" text-anchor="end">#1</text>

    <text x="34" y="154" fill="#E0E0FF">JavaScript</text>
    <rect x="150" y="139" width="300" height="16" rx="8" fill="#1F2937"/>
    <rect x="150" y="139" width="260" height="16" rx="8" fill="url(#barGrad)"/>
    <text x="465" y="154" fill="#E0E0FF" text-anchor="end">#2</text>

    <text x="34" y="192" fill="#E0E0FF">PHP</text>
    <rect x="150" y="177" width="300" height="16" rx="8" fill="#1F2937"/>
    <rect x="150" y="177" width="220" height="16" rx="8" fill="url(#barGrad)"/>
    <text x="465" y="192" fill="#E0E0FF" text-anchor="end">#3</text>

    <text x="34" y="230" fill="#E0E0FF">CSS</text>
    <rect x="150" y="215" width="300" height="16" rx="8" fill="#1F2937"/>
    <rect x="150" y="215" width="190" height="16" rx="8" fill="url(#barGrad)"/>
    <text x="465" y="230" fill="#E0E0FF" text-anchor="end">#4</text>

    <text x="34" y="268" fill="#E0E0FF">Dockerfile</text>
    <rect x="150" y="253" width="300" height="16" rx="8" fill="#1F2937"/>
    <rect x="150" y="253" width="165" height="16" rx="8" fill="url(#barGrad)"/>
    <text x="465" y="268" fill="#E0E0FF" text-anchor="end">#5</text>
  </g>
</svg>
